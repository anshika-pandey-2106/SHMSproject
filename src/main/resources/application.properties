# ?? Server ?????????????????????????????????????????????????????
server.port=8080

# ?? MongoDB connection ??????????????????????????????????????????
# Option A: local MongoDB (install MongoDB Community on your machine)
spring.data.mongodb.uri=mongodb://localhost:27017/shms_db

# Option B: MongoDB Atlas (free cloud database at mongodb.com/atlas)
# spring.data.mongodb.uri=mongodb+srv://<username>:<password>@cluster0.xxxxx.mongodb.net/shms_db

spring.data.mongodb.database=shms_db

# ?? App name ????????????????????????????????????????????????????
spring.application.name=hostel-management

# ?? Logging (optional, helps while learning) ????????????????????
logging.level.org.springframework.data.mongodb=DEBUG
